name: CI Socially

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation des dépendances
        run: pnpm install

      - name: Vérification du Lint (ESLint)
        run: pnpm lint

      - name: Vérification des types (TypeScript)
        run: pnpm typecheck

      - name: Exécution des tests (Vitest)
        run: pnpm vitest run # Le mot 'run' est crucial ici

      - name: Tentative de Build
        run: pnpm build